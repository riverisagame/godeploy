id: "webman-api"
name: "Webman 微服务接口"
repo: "https://gitee.com/walkor/webman.git"
branch: "master"
exclude:
  - ".git"
  - "vendor"
  - "runtime"
  - ".env"
environments:
  - id: "staging"
    name: "测试环境"
    default_branch: "master"
    keep_releases: 3
    servers:
      - host: "127.0.0.1"
        port: 22
        user: "dan"
        deploy_to: "/tmp/demo_deploy/webman/staging"
  - id: "production"
    name: "生产环境"
    default_branch: "master"
    keep_releases: 5
    servers:
      - host: "127.0.0.1"
        port: 22
        user: "dan"
        deploy_to: "/tmp/demo_deploy/webman/production"
