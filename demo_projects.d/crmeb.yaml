id: "crmeb-shop"
name: "CRMEB 商城系统"
repo: "https://gitee.com/ZhongBangKeJi/CRMEB.git"
branch: "master"
exclude:
  - ".git"
  - "vendor"
  - "runtime"
  - "public/uploads"
  - ".env"
environments:
  - id: "test"
    name: "测试环境"
    default_branch: "master"
    keep_releases: 3
    servers:
      - host: "127.0.0.1"
        port: 22
        user: "root"
        deploy_to: "/tmp/demo_deploy/crmeb/test"
  - id: "production"
    name: "生产环境"
    default_branch: "master"
    keep_releases: 5
    servers:
      - host: "127.0.0.1"
        port: 22
        user: "root"
        deploy_to: "/tmp/demo_deploy/crmeb/production"
