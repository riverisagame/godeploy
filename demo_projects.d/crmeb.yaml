id: "crmeb-shop"
name: "CRMEB 商城系统"
repo: "./demo_workspace/gitee_demo/CRMEB"
branch: "master"
exclude:
  - ".git"
  - "vendor"
  - "runtime"
  - "public/uploads"
  - ".env"
environments:
  - id: "test"
    name: "测试环境"
    default_branch: "master"
    keep_releases: 3
    servers:
      - host: "localhost"
        port: 2222
        user: "dan"
        deploy_to: "/tmp/demo_deploy/crmeb/test"
  - id: "production"
    name: "生产环境"
    default_branch: "master"
    keep_releases: 5
    servers:
      - host: "localhost"
        port: 2223
        user: "dan"
        deploy_to: "/tmp/demo_deploy/crmeb/production"
